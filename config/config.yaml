# Trading Bot Configuration
exchange:
  name: "binance"
  testnet: true  # Set to false for real trading
  markets:
    - spot
    - futures
    - margin

# Trading Parameters
trading:
  base_currencies:
    - "USDT"
    - "BUSD"
    - "USD"
  trading_pairs:
    spot:
      - "BTC/USDT"
      - "ETH/USDT"
      - "BNB/USDT"
      - "XRP/USDT"
      - "ADA/USDT"
      - "SOL/USDT"
      - "DOT/USDT"
      - "DOGE/USDT"
      - "AVAX/USDT"
      - "MATIC/USDT"
      - "LINK/USDT"
      - "UNI/USDT"
      - "ATOM/USDT"
      - "LTC/USDT"
      - "ETC/USDT"
    futures:
      - "BTC/USDT:USDT"
      - "ETH/USDT:USDT"
      - "BNB/USDT:USDT"
      - "SOL/USDT:USDT"
      - "XRP/USDT:USDT"
    margin:
      - "BTC/USDT"
      - "ETH/USDT"
      - "BNB/USDT"
  timeframes:
    - "1m"
    - "5m"
    - "15m"
    - "30m"
    - "1h"
    - "4h"
    - "1d"
  
  pair_settings:
    default:  # Default settings for all pairs
      min_volume_usd: 1000000
      max_position_size: 0.1
      leverage: 1
    "BTC/USDT":  # Specific settings for BTC/USDT
      min_volume_usd: 5000000
      max_position_size: 0.05
      leverage: 2
    "ETH/USDT":  # Specific settings for ETH/USDT
      min_volume_usd: 3000000
      max_position_size: 0.08
      leverage: 2

# Risk Management
risk_management:
  max_position_size: 0.1  # 10% of portfolio
  stop_loss_percentage: 0.02  # 2%
  take_profit_percentage: 0.04  # 4%
  max_open_trades: 5
  max_daily_trades: 20
  max_drawdown: 0.15  # 15%
  position_sizing_method: "risk_based"  # Options: fixed, risk_based, kelly_criterion
  per_pair_limits:
    max_exposure: 0.2  # 20% max exposure per pair
    max_daily_loss: 0.05  # 5% max daily loss per pair
  leverage_settings:
    max_leverage: 3
    auto_deleveraging: true
    maintenance_margin: 0.05  # 5%
  
# Machine Learning Settings
ml_settings:
  # General Settings
  lookback_period: 100
  feature_size: 32
  training_data_days: 365
  validation_split: 0.2
  batch_size: 32
  epochs: 100
  
  # Model Architecture
  lstm:
    units: [128, 64, 32]
    dropout_rate: 0.2
    recurrent_dropout: 0.1
    bidirectional: true
    optimizer:
      type: "adam"
      learning_rate: 0.001
      beta_1: 0.9
      beta_2: 0.999
  
  transformer:
    num_layers: 3
    num_heads: 4
    d_model: 64
    dff: 256
    dropout_rate: 0.1
    optimizer:
      type: "adam"
      learning_rate: 0.0001
      warmup_steps: 4000
  
  # Feature Engineering
  feature_engineering:
    use_technical_indicators: true
    use_sentiment_analysis: true
    use_market_indicators: true
    technical_indicators:
      - type: "RSI"
        params: {"timeperiod": 14}
      - type: "MACD"
        params: {"fastperiod": 12, "slowperiod": 26, "signalperiod": 9}
      - type: "ATR"
        params: {"timeperiod": 14}
      - type: "BBANDS"
        params: {"timeperiod": 20, "nbdevup": 2, "nbdevdn": 2}
    market_indicators:
      - "volume"
      - "open_interest"
      - "funding_rate"
      - "liquidations"
    sentiment_features:
      - "social_sentiment"
      - "news_sentiment"
      - "market_sentiment"
  
  # Model Ensemble
  ensemble:
    models:
      - name: "lstm"
        weight: 0.3
        enabled: true
      - name: "transformer"
        weight: 0.3
        enabled: true
      - name: "sentiment"
        weight: 0.2
        enabled: true
      - name: "regime"
        weight: 0.2
        enabled: true
    
    combination_method: "weighted_average"
    dynamic_weights: true
    weight_update_interval: 86400  # 24 hours
  
  # Training
  training:
    early_stopping:
      enabled: true
      patience: 10
      min_delta: 0.001
    checkpointing:
      enabled: true
      save_best_only: true
      monitor: "val_loss"
    learning_rate_scheduler:
      enabled: true
      type: "reduce_on_plateau"
      patience: 5
      factor: 0.5
    
    augmentation:
      enabled: true
      methods:
        - "time_warp"
        - "window_warp"
        - "random_noise"
      probability: 0.5
    
    validation:
      cross_validation: true
      n_splits: 5
      shuffle: true
  
  # Prediction
  prediction:
    ensemble_threshold: 0.7
    min_confidence: 0.8
    prediction_horizon: 24  # hours
    update_frequency: 3600  # seconds
    
    calibration:
      enabled: true
      method: "isotonic"
      recalibrate_interval: 604800  # 7 days
    
    uncertainty:
      estimate: true
      method: "dropout"
      monte_carlo_samples: 100
  
  # Model Monitoring
  monitoring:
    track_predictions: true
    save_predictions: true
    performance_metrics:
      - "accuracy"
      - "precision"
      - "recall"
      - "f1"
      - "roc_auc"
      - "profit_factor"
    
    drift_detection:
      enabled: true
      method: "ks_test"
      threshold: 0.05
      window_size: 1000
    
    retraining:
      enabled: true
      trigger:
        metric_threshold: 0.1
        time_interval: 604800  # 7 days
      data_window: 180  # days
  
# Strategy Settings
strategy:
  confidence_threshold: 0.7
  min_volume_usd: 1000000  # Minimum 24h volume in USD
  signal_combination: "weighted"  # Options: weighted, majority_vote, unanimous
  weights:
    technical: 0.4
    sentiment: 0.3
    ml_prediction: 0.3
  indicators:
    moving_averages:
      - type: "SMA"
        periods: [20, 50, 200]
      - type: "EMA"
        periods: [9, 21, 55]
    oscillators:
      - type: "RSI"
        period: 14
      - type: "MACD"
        fast_period: 12
        slow_period: 26
        signal_period: 9
      - type: "Stochastic"
        k_period: 14
        d_period: 3
    volatility:
      - type: "ATR"
        period: 14
      - type: "Bollinger"
        period: 20
        std_dev: 2
    volume:
      - type: "OBV"
      - type: "VWAP"
        period: "1d"
  
# Sentiment Analysis
sentiment:
  update_interval: 1800  # seconds
  min_confidence: 0.6
  sources:
    - twitter
    - reddit
    - news
  subreddits:
    - cryptocurrency
    - bitcoin
    - wallstreetbets
    - CryptoMarkets
    - ethtrader
    - binance
  keywords:
    - "crypto"
    - "bitcoin"
    - "ethereum"
    - "blockchain"
    - "defi"
    - "nft"
  
# Social Media API Keys
twitter:
  api_key: ""
  api_secret: ""
  access_token: ""
  access_token_secret: ""

reddit:
  client_id: ""
  client_secret: ""
  user_agent: "RetroTrade/1.0"

news:
  api_key: ""  # NewsAPI key
  
# Telegram Settings
telegram:
  bot_token: ""  # Add your Telegram bot token
  chat_id: ""    # Add your chat ID
  notification_settings:
    trade_signals: true
    position_updates: true
    daily_reports: true
    error_alerts: true
    performance_metrics: true
    price_alerts: true

# Data Collection
data_collection:
  historical_data_start: "2020-01-01"
  update_interval: 3600  # seconds
  data_sources:
    - exchange
    - alternative_data
    - market_indicators
  storage:
    type: "database"  # Options: csv, database
    database:
      type: "postgresql"
      host: "localhost"
      port: 5432
      name: "trading_data"
      user: ""
      password: ""
  
# Performance Monitoring
performance:
  metrics:
    - sharpe_ratio
    - sortino_ratio
    - max_drawdown
    - win_rate
    - profit_factor
    - calmar_ratio
    - omega_ratio
    - alpha
    - beta
  monitoring_interval: 3600  # seconds
  alert_thresholds:
    drawdown_alert: 0.1  # 10%
    profit_target: 0.5  # 50%
    loss_limit: -0.2  # -20%
  benchmarks:
    - "BTC/USDT"
    - "S&P500"
  
# Risk Controls
risk_controls:
  max_leverage: 3
  margin_call_threshold: 0.8  # 80% of margin
  auto_deleveraging: true
  position_limits:
    BTC/USDT: 1.0  # Maximum position size in BTC
    ETH/USDT: 10.0  # Maximum position size in ETH
  circuit_breakers:
    max_daily_loss: 0.1  # 10%
    max_drawdown: 0.2  # 20%
    volatility_threshold: 0.05  # 5% price movement
    market_correlation_threshold: 0.8  # Stop trading if market correlation exceeds this
    volume_spike_threshold: 3.0  # Multiple of average volume
    spread_threshold: 0.005  # Maximum allowed spread
    
  dynamic_position_sizing:
    enabled: true
    volatility_lookback: 20
    position_scale_factor: 0.5
    min_position_size: 0.01
    max_position_size: 0.2
    
  correlation_management:
    enabled: true
    max_correlated_pairs: 3
    correlation_threshold: 0.7
    lookback_period: 30

# Reporting
reporting:
  performance_report_interval: 24  # hours
  save_trades_history: true
  plot_charts: true
  export_formats:
    - csv
    - json
  metrics_to_report:
    - pnl
    - win_rate
    - drawdown
    - volume
    - exposure
    - risk_metrics
    - pair_performance
  notifications:
    email:
      enabled: true
      smtp_server: ""
      from_address: ""
      to_addresses: []
    telegram:
      enabled: true
  
# System Settings
system:
  log_level: "INFO"
  backup_interval: 86400  # seconds
  max_retries: 3
  retry_delay: 5  # seconds
  timeout: 30  # seconds
  maintenance_window:
    enabled: true
    time: "00:00"  # UTC
    duration: 3600  # seconds

# Security Settings
security:
  api_key_encryption:
    enabled: true
    encryption_method: "AES-256"
    key_rotation_interval: 7  # days
  
  ip_whitelist:
    enabled: true
    allowed_ips: []  # Add your IPs here
    
  two_factor_auth:
    enabled: true
    method: "TOTP"  # Time-based One-Time Password
    backup_codes: 5
    
  session_management:
    max_sessions: 3
    session_timeout: 3600  # seconds
    require_reauth_for_critical: true

# Performance Optimization
performance_optimization:
  websocket:
    enabled: true
    max_connections: 50
    reconnect_interval: 5
    
  caching:
    enabled: true
    cache_type: "redis"
    ttl: 300  # seconds
    max_cache_size: "1GB"
    
  database:
    indexing:
      enabled: true
      auto_reindex: true
    optimization:
      vacuum_frequency: 86400  # seconds
      analyze_frequency: 43200  # seconds
      
  async_processing:
    enabled: true
    max_workers: 4
    task_timeout: 30

# Market Analysis
market_analysis:
  regime_detection:
    enabled: true
    methods:
      - "volatility_regime"
      - "trend_regime"
      - "volume_regime"
    lookback_period: 90
    update_frequency: 3600
    
  multi_timeframe:
    enabled: true
    timeframe_correlation: true
    weighted_analysis: true
    primary_timeframe: "1h"
    secondary_timeframes: ["15m", "4h", "1d"]
    
  adaptive_parameters:
    enabled: true
    parameter_update_interval: 86400
    optimization_metric: "sharpe_ratio"
    min_optimization_period: 30

# API Settings
api:
  host: "0.0.0.0"
  port: 8000
  debug: false
  secret_key: ""  # Set this in production
  access_token_expire_minutes: 30
  rate_limiting:
    enabled: true
    calls_per_minute: 100
    burst_limit: 200
  cors:
    allow_origins: ["*"]
    allow_credentials: true
    allow_methods: ["*"]
    allow_headers: ["*"]
  trusted_hosts: ["*"]  # Configure in production

# Frontend Settings
frontend:
  host: "localhost"
  port: 3000
  api_url: "http://localhost:8000"
  ws_url: "ws://localhost:8000/ws"
  theme:
    primary_color: "#1976d2"
    secondary_color: "#dc004e"
    background_color: "#f5f5f5"
  features:
    live_updates: true
    dark_mode: true
    notifications: true
    charts: true
    trading_view: true

# Authentication
auth:
  jwt_secret: ""  # Set this in production
  jwt_algorithm: "HS256"
  password_min_length: 8
  require_special_chars: true
  require_numbers: true
  max_login_attempts: 5
  lockout_duration: 300  # seconds
  session_duration: 3600  # seconds
  refresh_token_duration: 604800  # 7 days in seconds
  users:
    admin:
      username: "admin"
      hashed_password: ""  # Will be set during setup
      is_superuser: true
      disabled: false

# Redis Configuration
redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  ssl: false
  connection_pool: 10
  timeout: 10
  retry_on_timeout: true
  health_check_interval: 30

# Database Settings
database:
  type: "postgresql"
  host: "localhost"
  port: 5432
  name: "trading_data"
  user: ""
  password: ""
  pool_size: 20
  max_overflow: 10
  pool_timeout: 30
  pool_recycle: 1800
  echo: false
  ssl_mode: "prefer"

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  file_logging:
    enabled: true
    path: "logs"
    max_size: 10485760  # 10MB
    backup_count: 5
    files:
      system: "system.log"
      trades: "trades.log"
      errors: "errors.log"
      debug: "debug.log"
  console_logging:
    enabled: true
    color: true
  
# Monitoring Settings
monitoring:
  health_check:
    enabled: true
    interval: 60
    endpoints:
      - name: "API"
        url: "http://localhost:8000/health"
      - name: "Database"
        type: "postgres"
      - name: "Redis"
        type: "redis"
  metrics:
    enabled: true
    prometheus:
      enabled: true
      port: 9090
    statsd:
      enabled: false
      host: "localhost"
      port: 8125
  alerts:
    email:
      enabled: true
      smtp_server: ""
      from_address: ""
      to_addresses: []
    telegram:
      enabled: true
    discord:
      enabled: false
      webhook_url: ""

# Backup Settings
backup:
  enabled: true
  interval: 86400  # 24 hours
  retention_days: 30
  types:
    - database
    - configuration
    - logs
  storage:
    type: "local"  # Options: local, s3
    path: "backups"
    compression: true
    encryption: true
  cloud:
    provider: "aws"
    bucket: ""
    region: ""
    access_key: ""
    secret_key: ""
